<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MyFlix — Discover movies and series, save your watchlist, rate and review films all in one place." />
    <meta name="theme-color" content="#141414" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MyFlix — Your Personal Movie Hub" />
    <meta property="og:description" content="Browse thousands of movies and series, create watchlists, and track everything you watch." />

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.omdbapi.com" />
    <link rel="dns-prefetch" href="https://m.media-amazon.com" />

    <!-- Font: load with display=swap to prevent render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>MyFlix — Your Personal Movie Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
